<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0f172a"/>
  <!-- 3x3 grid lines -->
  <line x1="22" y1="8" x2="22" y2="56" stroke="#334155" stroke-width="2"/>
  <line x1="42" y1="8" x2="42" y2="56" stroke="#334155" stroke-width="2"/>
  <line x1="8" y1="22" x2="56" y2="22" stroke="#334155" stroke-width="2"/>
  <line x1="8" y1="42" x2="56" y2="42" stroke="#334155" stroke-width="2"/>
  <!-- X mark top-left -->
  <line x1="11" y1="11" x2="19" y2="19" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19" y1="11" x2="11" y2="19" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- O mark center -->
  <circle cx="32" cy="32" r="6" stroke="#F97316" stroke-width="2.5" fill="none"/>
  <!-- X mark bottom-right -->
  <line x1="45" y1="45" x2="53" y2="53" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="53" y1="45" x2="45" y2="53" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round"/>
</svg>
